name: idiom_crossword
description: 成语填字游戏 - 类似成语小秀才的填字拼图游戏
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.4.9

  # 本地数据库
  drift: ^2.16.0
  sqlite3_flutter_libs: ^0.5.20
  path_provider: ^2.1.2
  path: ^1.9.0

  # 动画增强
  flutter_animate: ^4.5.0

  # 音频
  audioplayers: ^5.2.1

  # 设备能力
  haptic_feedback: ^0.5.1
  games_services: ^3.0.0  # Game Center 集成

  # 工具
  collection: ^1.18.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

  # 代码生成
  drift_dev: ^2.16.0
  build_runner: ^2.4.7
  freezed: ^2.4.6
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  assets:
    - assets/data/

  # fonts 暂不配置，iOS 使用系统自带苹方和宋体，生僻字后续引入 fallback
